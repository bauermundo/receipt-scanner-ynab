<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2E7D32"/>
      <stop offset="100%" stop-color="#1B5E20"/>
    </linearGradient>
    <linearGradient id="trunk" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5D4037"/>
      <stop offset="100%" stop-color="#6D4C41"/>
    </linearGradient>
    <linearGradient id="leaves1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#81C784"/>
      <stop offset="100%" stop-color="#4CAF50"/>
    </linearGradient>
    <linearGradient id="leaves2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#66BB6A"/>
      <stop offset="100%" stop-color="#388E3C"/>
    </linearGradient>
    <linearGradient id="leaves3" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#43A047"/>
      <stop offset="100%" stop-color="#76d275"/>
    </linearGradient>
  </defs>

  <!-- Background: rounded square -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- === R as a Tree === -->

  <!-- Trunk: vertical stroke of R -->
  <rect x="132" y="130" width="42" height="280" rx="6" fill="url(#trunk)"/>

  <!-- Trunk: leg of R (diagonal branch/root going down-right) -->
  <polygon points="230,270 270,270 340,410 298,410" fill="url(#trunk)" />

  <!-- Small roots at base -->
  <ellipse cx="153" cy="408" rx="30" ry="8" fill="#4E342E" opacity="0.5"/>

  <!-- === Canopy: leaf clusters forming the bowl of R === -->

  <!-- Main canopy cluster (top-right, the bowl of R) -->
  <ellipse cx="240" cy="175" rx="85" ry="70" fill="url(#leaves1)"/>

  <!-- Upper leaves -->
  <ellipse cx="200" cy="135" rx="65" ry="50" fill="url(#leaves3)"/>

  <!-- Right side leaves -->
  <ellipse cx="290" cy="200" rx="55" ry="55" fill="url(#leaves2)"/>

  <!-- Top accent leaves -->
  <ellipse cx="260" cy="120" rx="45" ry="35" fill="url(#leaves3)" opacity="0.8"/>

  <!-- Lower connecting leaves (where bowl meets the leg) -->
  <ellipse cx="220" cy="250" rx="55" ry="35" fill="url(#leaves2)" opacity="0.9"/>

  <!-- Small leaf accents -->
  <circle cx="170" cy="115" r="22" fill="#A5D6A7" opacity="0.6"/>
  <circle cx="310" cy="155" r="18" fill="#A5D6A7" opacity="0.5"/>
  <circle cx="280" cy="110" r="15" fill="#C8E6C9" opacity="0.5"/>

  <!-- Tiny scattered leaves -->
  <circle cx="150" cy="145" r="12" fill="#81C784" opacity="0.7"/>
  <circle cx="330" cy="190" r="12" fill="#81C784" opacity="0.4"/>
  <circle cx="195" cy="105" r="10" fill="#C8E6C9" opacity="0.6"/>

</svg>
