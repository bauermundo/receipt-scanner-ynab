name: receipt_scanner_ynab
description: Scan receipts with Claude AI and create YNAB transactions.
publish_to: none

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Image handling
  image_picker: ^1.0.7
  flutter_image_compress: ^2.1.0

  # HTTP
  http: ^1.2.1

  # OAuth 2.0 + PKCE
  flutter_appauth: ^8.0.0

  # Deep link handling (OAuth callback)
  app_links: ^6.0.0

  # Secure storage
  flutter_secure_storage: ^9.0.0

  # Non-sensitive preferences
  shared_preferences: ^2.2.3

  # Formatting
  intl: ^0.19.0

  # JSON serialization
  json_annotation: ^4.9.0

  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code generation
  build_runner: ^2.4.9
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
